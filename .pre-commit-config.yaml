# Overrides the shared config: the shared `verify` hook wraps the command in a
# bash invocation that breaks on R's verify command (it contains the double
# quotes from the rcmdcheck --as-cran argument). Here the R code is passed as a
# single argv element, so no shell quoting is involved.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5120']
      # The imported validator corpus is deliberately byte-sensitive: fixtures
      # exercise trailing whitespace, CR/CRLF/CR line endings, BOMs, and
      # UTF-16, so the whitespace/EOL-normalizing hooks must not rewrite them.
      - id: end-of-file-fixer
        exclude: ^tests/testthat/fixtures/corpus/
      - id: trailing-whitespace
        exclude: ^tests/testthat/fixtures/corpus/
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
        exclude: ^tests/testthat/fixtures/corpus/
      - id: check-case-conflict
  # Air: fast, R-free (Rust binary) formatter for R sources. Runs per commit and
  # auto-fixes; air.toml controls style + exclusions (so data-raw/ dev scripts
  # are skipped even when staged). Using the managed air-pre-commit repo instead
  # of a local `air format` hook means contributors do not need air on PATH,
  # and the version is pinned here. https://posit-dev.github.io/air/
  - repo: https://github.com/posit-dev/air-pre-commit
    rev: 0.8.2
    hooks:
      - id: air-format
  - repo: local
    hooks:
      - id: verify
        name: verify (mirrors CI)
        entry: Rscript -e
        args:
          - 'source("tools/check-docs.R"); source("tools/check-findings-registry.R"); lints <- lintr::lint_package(); if (length(lints)) { print(lints); quit(status = 1) }; rcmdcheck::rcmdcheck(args = "--as-cran", error_on = "warning")'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        verbose: true
