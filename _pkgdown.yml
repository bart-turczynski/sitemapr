url: https://bart-turczynski.github.io/sitemapr/
destination: site

template:
  bootstrap: 5

authors:
  "Bart Turczynski":
    href: https://turczynski.pl

home:
  title: "sitemapr — Parse and Validate XML Sitemaps"
  description: >
    A deterministic toolkit for reading and validating XML, text, and index
    sitemaps against the Sitemap Protocol 0.9 and related W3C and RFC standards.
    Parses sitemap sources into tidy tibbles, expands sitemap indexes, and
    reports schema and protocol findings with stable, reproducible output.

navbar:
  structure:
    left:  [reference, articles, news, acknowledgments]
    right: [search, github]
  components:
    acknowledgments:
      text: Acknowledgments
      href: https://github.com/bart-turczynski/sitemapr/blob/main/ACKNOWLEDGMENTS.md
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/bart-turczynski/sitemapr
      aria-label: GitHub

reference:
  - title: "Reading"
    desc: "Read a sitemap source into a tidy tibble of URLs."
    contents:
      - read_sitemap

  - title: "Discovery"
    desc: "Discover and expand a site's sitemaps as a tree."
    contents:
      - sitemap_tree
      - sitemap_tree_from_bytes
      - probe_url

  - title: "Validation"
    desc: >
      Validate a sitemap against the schema, protocol, and classification
      rules, returning stable, reproducible findings.
    contents:
      - validate_sitemap
      - validate_sitemap_ruleset

  - title: "Rulesets"
    desc: >
      Engine-aware validation: the supported rulesets, their published
      revisions, and the per-source context (including submission presets)
      that drives engine-specific interpretation.
    contents:
      - sitemap_rulesets
      - ruleset_revision
      - ruleset_context
      - ruleset_context_for_child
      - gsc_submission
      - robots_cross_submission

  - title: "Auditing"
    desc: >
      Audit a sitemap in a single pass, compare audits over time, and access
      the components of a result.
    contents:
      - audit_sitemap
      - sitemap_audit
      - compare_sitemap_audits
      - audit_unchanged
      - audit_accessors
      - sitemap_companions

  - title: "Limits"
    desc: >
      Default bounds for discovery, sitemapindex expansion, and bounded HTTP
      fetches.
    contents:
      - discovery_limits
      - index_limits
      - fetch_limits

  - title: "Reporting"
    desc: "Render a self-contained HTML report for a sitemap."
    contents:
      - report_sitemap

  - title: "Request customization"
    desc: >
      Configure the HTTP requests sitemapr issues — custom headers,
      authentication, a proxy, TLS options, retry/backoff, per-host throttling,
      and opt-in bounded-concurrency expansion — via a request-policy passed to
      any reading, validation, or discovery entry point.
    contents:
      - request_policy
      - request_auth_basic
      - request_auth_bearer
      - request_proxy
      - request_retry
      - request_throttle

footer:
  structure:
    left: developed_by
    right: [built_with, related]
  components:
    related: >
      Related:
      <a href="https://bart-turczynski.github.io/rurl/">rurl</a> ·
      <a href="https://bart-turczynski.github.io/pslr/">pslr</a> ·
      <a href="https://bart-turczynski.github.io/punycoder/">punycoder</a>
