# Full cross-platform R CMD check matrix (macOS = 10x Actions minute multiplier).
# Runs ONLY on demand (workflow_dispatch) or when preparing a release (tags
# matching 'v*'). Routine merges to main and PRs do NOT trigger it. Fast per-PR
# feedback (lint + one Ubuntu --as-cran check + coverage) lives in verify.yml.
name: Full platform check

on:
  # Release / CRAN-submission prep: tags matching 'v*'.
  push:
    tags: ['v*']
  # On demand.
  workflow_dispatch:

permissions: read-all

concurrency:
  group: full-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          # windows-latest is intentionally omitted. The dependency chain
          # sitemapr -> rurl -> pslr is GitHub-source-only (neither is on CRAN
          # at the required version yet), so pak must query the GitHub API and
          # build from source. The Windows runners consistently fail that query
          # ("Cannot query GitHub, are you offline?") via pak's schannel/libcurl
          # TLS stack, while Linux + macOS resolve the same chain reliably.
          # Re-add Windows once rurl + pslr reach CRAN: pak will then use the
          # Windows binaries with no GitHub query and no source build.
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # The strict CRAN-grade pass: --as-cran across every platform. This is
          # what CRAN itself runs, so it is the gate before a release.
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true
          build_args: 'c("--no-manual")'
