on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      # Use build_site() (not build_site_github_pages()): _pkgdown.yml sets
      # `destination: site` because docs/ holds durable project docs, and
      # build_site() honors that field. build_site_github_pages() force-defaults
      # dest_dir="docs" and its clean step aborts on the non-pkgdown docs/ dir.
      # The .nojekyll marker (which build_site_github_pages would add) is written
      # explicitly so GitHub Pages serves the site verbatim.
      - name: Build site
        run: |
          pkgdown::build_site(new_process = FALSE, install = FALSE)
          writeLines("", "site/.nojekyll")
        shell: Rscript {0}

      # _pkgdown.yml sets `destination: site` (docs/ holds durable project docs),
      # so upload the built site/ directory rather than the pkgdown default docs/.
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # Deploy through the native GitHub Actions Pages path (source = "GitHub
  # Actions"), guarded by a single-flight concurrency group. This replaces the
  # old gh-pages branch push, whose per-push auto "pages build and deployment"
  # runs raced each other on rapid successive merges to main ("Deployment
  # failed, try again later").
  deploy:
    if: github.event_name != 'pull_request'
    needs: pkgdown
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
