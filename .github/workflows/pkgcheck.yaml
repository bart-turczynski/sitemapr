name: pkgcheck

on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pkgcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: ropensci-review-tools/pkgcheck-action@main
