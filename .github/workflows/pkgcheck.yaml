name: pkgcheck

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pkgcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: ropensci-review-tools/pkgcheck-action@main
