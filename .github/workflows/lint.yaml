# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Mirrors the platform-independent steps of the local pre-push verify gate:
# the roxygen2-pinned docs-reproducibility guard (tools/check-docs.R), the
# findings-registry sync guard (tools/check-findings-registry.R), and
# lintr::lint_package(). The rcmdcheck step lives in R-CMD-check.yaml.
on:
  push:
    branches: [main, master]
  pull_request:

name: lint.yaml

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Install current-CRAN roxygen2; tools/check-docs.R then asserts it
          # equals DESCRIPTION's Config/roxygen2/version pin, so the docs guard
          # compares against the same generator the committed man/ + NAMESPACE
          # were produced with. If CRAN moves past the pin the guard fails
          # loudly — the signal to bump the pin and regenerate docs. local::.
          # installs the package's own deps so roxygenise() and lintr can load
          # the namespace. (An exact pak pin, roxygen2@x.y.z, trips a solver
          # dependency conflict here, so we rely on the guard for the version
          # check instead.)
          extra-packages: any::lintr, any::roxygen2, local::.
          needs: lint

      - name: Docs are reproducible (tools/check-docs.R)
        run: source("tools/check-docs.R")
        shell: Rscript {0}

      - name: Findings registry in sync (tools/check-findings-registry.R)
        run: source("tools/check-findings-registry.R")
        shell: Rscript {0}

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
