# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Mirrors the rcmdcheck --as-cran step of the local pre-push verify gate, run
# across the standard r-lib OS/R-version matrix as the CI backstop.
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          # windows-latest is intentionally omitted. The dependency chain
          # sitemapr -> rurl -> pslr is GitHub-source-only (neither is on CRAN
          # at the required version yet), so pak must query the GitHub API and
          # build from source. The Windows runners consistently fail that query
          # ("Cannot query GitHub, are you offline?") via pak's schannel/libcurl
          # TLS stack, while Linux + macOS resolve the same chain reliably.
          # Re-add Windows once rurl + pslr reach CRAN: pak will then use the
          # Windows binaries with no GitHub query and no source build.
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # --as-cran + fail on WARNING, matching the pre-push verify gate.
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true
          build_args: 'c("--no-manual")'
