# Dependency vulnerability audit against the OSV database (https://osv.dev)
# via {rosv}. Unlike security-audit.yml (Sonatype OSS Index), OSV requires no
# account, token, or repository secrets, and has first-class CRAN coverage.
#
# Runs tests/testthat/test-osv.R, which checks sitemapr's runtime dependency
# closure (recursive Depends + Imports) at installed versions and fails if any
# has a known OSV advisory for that version. The same test skips cleanly in
# the other workflows.
name: osv-audit

on:
  schedule:
    # Weekly, Monday 04:23 UTC (offset from security-audit.yml at 04:17).
    - cron: '23 4 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'DESCRIPTION'
      - 'tests/testthat/test-osv.R'
      - '.github/workflows/osv-audit.yml'

permissions: read-all

concurrency:
  group: osv-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    name: OSV dependency audit
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # testthat::test_local() does not set NOT_CRAN, so set it here or
      # skip_on_cran() in test-osv.R would skip the audit silently.
      NOT_CRAN: true
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rosv, any::testthat, local::.
          needs: check
      - name: Run OSV dependency audit
        run: testthat::test_local(filter = "osv", stop_on_failure = TRUE)
        shell: Rscript {0}
