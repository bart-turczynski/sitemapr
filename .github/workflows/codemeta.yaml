on:
  push:
    branches: [main]
    paths:
      - DESCRIPTION
      - CITATION.cff
      - inst/CITATION
      - .github/workflows/codemeta.yaml
  workflow_dispatch:

name: codemeta

permissions:
  contents: write

jobs:
  codemeta:
    runs-on: ubuntu-latest
    concurrency:
      group: codemeta-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::codemetar

      - name: Regenerate codemeta.json
        run: codemetar::write_codemeta(".")
        shell: Rscript {0}

      - name: Commit codemeta.json if changed
        run: |
          if [ -n "$(git status --porcelain codemeta.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add codemeta.json
            git commit -m "chore: refresh codemeta.json [skip ci]"
            git push
          else
            echo "codemeta.json unchanged."
          fi
