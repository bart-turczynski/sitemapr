# Dependency vulnerability audit against the Sonatype OSS Index via {oysteR}.
#
# Runs tests/testthat/test-security.R (oysteR::expect_secure("sitemapr")), which
# audits sitemapr's declared dependencies and fails if any have a known OSS Index
# advisory. OSS Index requires authentication (anonymous requests get HTTP
# 401), so this job supplies OSSINDEX_USER / OSSINDEX_TOKEN as repository
# secrets. The same test skips cleanly in the other workflows, where those
# secrets are absent.
#
# Required repository secrets:
#   OSSINDEX_USER   - OSS Index account email (https://ossindex.sonatype.org)
#   OSSINDEX_TOKEN  - OSS Index API token
name: security-audit

on:
  schedule:
    # Weekly, Monday 04:17 UTC (off the hour to avoid scheduler congestion).
    - cron: '17 4 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'DESCRIPTION'
      - 'tests/testthat/test-security.R'
      - '.github/workflows/security-audit.yml'

permissions: read-all

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    name: oysteR OSS Index audit
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      OSSINDEX_USER: ${{ secrets.OSSINDEX_USER }}
      OSSINDEX_TOKEN: ${{ secrets.OSSINDEX_TOKEN }}
      # testthat::test_local() does not set NOT_CRAN, so set it here or
      # skip_on_cran() in test-security.R would skip the audit silently.
      NOT_CRAN: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::oysteR, any::testthat, local::.
          needs: check
      - name: Run oysteR security audit
        run: testthat::test_local(filter = "security", stop_on_failure = TRUE)
        shell: Rscript {0}
